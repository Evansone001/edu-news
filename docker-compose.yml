version: '3.8'

services:
  edunews-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edunews-frontend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - NEXT_PUBLIC_GHOST_URL=${NEXT_PUBLIC_GHOST_URL:-https://edunews.co.ke}
      - NEXT_PUBLIC_GHOST_CONTENT_API_KEY=${NEXT_PUBLIC_GHOST_CONTENT_API_KEY:-}
    restart: unless-stopped
    networks:
      - edunews-network

networks:
  edunews-network:
    driver: bridge
