<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="eduGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <filter id="subtleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="100" fill="transparent"/>
  
  <!-- EDU text with golden gradient and modern font -->
  <text x="20" y="68" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" letter-spacing="1" fill="url(#eduGradient)" filter="url(#subtleShadow)">
    EDU
  </text>
  
  <!-- Vertical separator -->
  <line x1="155" y1="35" x2="155" y2="75" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- NEWS text -->
  <text x="175" y="68" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="600" letter-spacing="1" fill="#374151">
    NEWS
  </text>
  
  <!-- Subtle accent dot -->
  <circle cx="385" cy="55" r="4" fill="url(#eduGradient)"/>
</svg>
